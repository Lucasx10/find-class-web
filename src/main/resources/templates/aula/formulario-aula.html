<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{template.html}">
<head>
    <title>Agendamento de aulas</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <main class="container">
            <section class="card form-card">
                <h2 class="title">Agendamento de aulas</h2>

                <form method="post" action="#" th:action="@{/aulas}" th:object="${dados}">
                    <input type="hidden" name="id" th:field="*{id}">

                    <div class="form-group">
                        <label for="especialidade">Especialidade</label>
                        <select id="especialidade" name="especialidade" required th:field="*{especialidade}">
                            <option th:value="${null}">Selecione uma especialidade</option>
                            <option th:each="especialidade : ${especialidades}" th:value="${especialidade}" th:text="${especialidade}" th:selected="${dados.especialidade == especialidade}"></option>
                        </select>
                        <div class="alert alert-danger" th:if="${#fields.hasErrors('especialidade')}" th:errors="*{especialidade}"></div>
                    </div>

                    <div class="form-group">
                        <label for="idProfessor">Professor</label>
                        <select id="idProfessor" name="idProfessor" required th:field="*{idProfessor}">
                            <option th:value="${null}">Selecione um professor</option>
                        </select>
                        <div class="alert alert-danger" th:if="${#fields.hasErrors('idProfessor')}" th:errors="*{idProfessor}">Erro!</div>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF do aluno</label>
                        <input type="text" id="cpf" placeholder="Digite o CPF do aluno" required th:field="*{aluno}">
                        <div class="alert alert-danger" th:if="${#fields.hasErrors('aluno')}" th:errors="*{aluno}"></div>
                    </div>

                    <div class="form-group">
                        <label for="data">Data</label>
                        <input type="datetime-local" id="data" required th:field="*{data}">
                        <div class="alert alert-danger" th:if="${#fields.hasErrors('data')}" th:errors="*{data}"></div>
                    </div>

                    <div class="buttons">
                        <button type="submit" class="btn btn-primary">
                            <img src="/static/assets/plus.png" th:src="@{/assets/plus.png}" alt="Ícone de adicionar" class="btn-icon">Cadastrar
                        </button>

                        <a href="listagem-aulas.html" th:href="@{/aulas}" class="btn btn-secondary">
                            <img src="/static/assets/back.png" th:src="@{/assets/back.png}" alt="Voltar" class="btn-icon">Voltar
                        </a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
