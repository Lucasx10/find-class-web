<!DOCTYPE html>
<html lang="pt"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{template.html}">
<head>
    <title>Listagem de aulas</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <main class="container">
            <section class="card">
                <h2 class="title">Listagem de aulas</h2>

                <div class="table-controls">
                    <a href="formulario-aula.html" th:href="@{/aulas/formulario}" class="btn btn-tertiary">
                        <img src="/static/assets/plus.png" th:src="@{/assets/plus.png}" alt="Ícone de adicionar" class="btn-icon">
                        Nova aula
                    </a>
                </div>

                <table class="tabela">
                    <thead>
                        <tr>
                            <th>Professor</th>
                            <th>Aluno</th>
                            <th>Data</th>
                            <th>Especialidade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="aula: ${aulas}">
                            <td th:text="${aula.professor}"></td>
                            <td th:text="${aula.aluno}"></td>
                            <td th:text="${#temporals.format(aula.data, 'dd/MM/yyyy HH:mm')}"></td>
                            <td  th:text="${aula.especialidade}"></td>
                            <td>
                                <a href="#" class="btn btn-icon" th:href="@{/aulas/formulario?id={id}(id=${aula.id})}" title="Editar">
                                    <img src="/static/assets/edit.svg" th:src="@{/assets/edit.svg}" alt="Editar">
                                </a>
                                <a href="#deleteModal" class="btn btn-icon" data-toggle="modal" th:data-id="${aula.id}" data-url="/aulas" title="Excluir">
                                    <img src="/static/assets/delete.svg" th:src="@{/assets/delete.svg}" alt="Excluir">
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:replace="~{componentes/_paginacao.html :: paginacao(url = 'aulas', registros = ${aulas})}"></div>
            </section>
        </main>

        <div th:replace="~{componentes/_modal_excluir.html :: modal}"></div>
    </div>
</body>
</html>
